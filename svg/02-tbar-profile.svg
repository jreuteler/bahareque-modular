<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" style="background:#ffffff">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-size="16" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">T 60×60 Steel Profile — Cross Section</text>
  <text x="250" y="50" text-anchor="middle" font-size="11" fill="#888" font-family="Helvetica,Arial,sans-serif">T 60×60 — ASTM A36</text>

  <!-- Profile drawing -->
  <!-- Scale: 3px per mm -->
  <!-- Flange: 60mm wide = 180px, 7mm thick = 21px -->
  <!-- Web: 7mm wide = 21px, 53mm tall = 159px -->
  <!-- Total height: 60mm = 180px -->
  <!-- Center at x=250, top at y=90 -->

  <!-- Flange -->
  <rect x="160" y="90" width="180" height="21" fill="#c0392b" stroke="#911" stroke-width="1.2" rx="1"/>

  <!-- Web (centered under flange) -->
  <rect x="239.5" y="111" width="21" height="159" fill="#c0392b" stroke="#911" stroke-width="1.2" rx="0.5"/>

  <!-- ==================== DIMENSION LINES ==================== -->
  <g font-family="Helvetica,Arial,sans-serif" fill="#333">

    <!-- Flange width: 60mm (horizontal, above flange) -->
    <line x1="160" y1="78" x2="340" y2="78" stroke="#333" stroke-width="0.7"/>
    <line x1="160" y1="74" x2="160" y2="82" stroke="#333" stroke-width="0.7"/>
    <line x1="340" y1="74" x2="340" y2="82" stroke="#333" stroke-width="0.7"/>
    <!-- Extension lines from profile corners up to dim line -->
    <line x1="160" y1="90" x2="160" y2="78" stroke="#333" stroke-width="0.4" stroke-dasharray="2,2"/>
    <line x1="340" y1="90" x2="340" y2="78" stroke="#333" stroke-width="0.4" stroke-dasharray="2,2"/>
    <text x="250" y="74" text-anchor="middle" font-size="10" font-weight="bold">60 mm</text>
    <text x="250" y="64" text-anchor="middle" font-size="8" fill="#666">(flange width)</text>

    <!-- Total height: 60mm (left side, full height) -->
    <line x1="135" y1="90" x2="135" y2="270" stroke="#333" stroke-width="0.7"/>
    <line x1="131" y1="90" x2="139" y2="90" stroke="#333" stroke-width="0.7"/>
    <line x1="131" y1="270" x2="139" y2="270" stroke="#333" stroke-width="0.7"/>
    <!-- Extension lines -->
    <line x1="160" y1="90" x2="135" y2="90" stroke="#333" stroke-width="0.4" stroke-dasharray="2,2"/>
    <line x1="239.5" y1="270" x2="135" y2="270" stroke="#333" stroke-width="0.4" stroke-dasharray="2,2"/>
    <text x="130" y="184" text-anchor="end" font-size="10" font-weight="bold" transform="rotate(-90, 130, 184)">60 mm</text>
    <text x="113" y="184" text-anchor="end" font-size="8" fill="#666" transform="rotate(-90, 113, 184)">(total height)</text>

    <!-- Flange thickness: 7mm (right side, top portion) -->
    <line x1="365" y1="90" x2="365" y2="111" stroke="#333" stroke-width="0.7"/>
    <line x1="361" y1="90" x2="369" y2="90" stroke="#333" stroke-width="0.7"/>
    <line x1="361" y1="111" x2="369" y2="111" stroke="#333" stroke-width="0.7"/>
    <!-- Extension lines -->
    <line x1="340" y1="90" x2="365" y2="90" stroke="#333" stroke-width="0.4" stroke-dasharray="2,2"/>
    <line x1="340" y1="111" x2="365" y2="111" stroke="#333" stroke-width="0.4" stroke-dasharray="2,2"/>
    <text x="375" y="104" font-size="9" font-weight="bold">7 mm</text>
    <text x="375" y="115" font-size="8" fill="#666">(flange thickness)</text>

    <!-- Web height: 53mm (right side, below flange) -->
    <line x1="280" y1="111" x2="280" y2="270" stroke="#333" stroke-width="0.7"/>
    <line x1="276" y1="111" x2="284" y2="111" stroke="#333" stroke-width="0.7"/>
    <line x1="276" y1="270" x2="284" y2="270" stroke="#333" stroke-width="0.7"/>
    <!-- Extension lines -->
    <line x1="260.5" y1="111" x2="280" y2="111" stroke="#333" stroke-width="0.4" stroke-dasharray="2,2"/>
    <line x1="260.5" y1="270" x2="280" y2="270" stroke="#333" stroke-width="0.4" stroke-dasharray="2,2"/>
    <text x="290" y="195" font-size="9" font-weight="bold">53 mm</text>
    <text x="290" y="207" font-size="8" fill="#666">(web height)</text>

    <!-- Web thickness: 7mm (bottom, horizontal) -->
    <line x1="239.5" y1="285" x2="260.5" y2="285" stroke="#333" stroke-width="0.7"/>
    <line x1="239.5" y1="281" x2="239.5" y2="289" stroke="#333" stroke-width="0.7"/>
    <line x1="260.5" y1="281" x2="260.5" y2="289" stroke="#333" stroke-width="0.7"/>
    <!-- Extension lines -->
    <line x1="239.5" y1="270" x2="239.5" y2="285" stroke="#333" stroke-width="0.4" stroke-dasharray="2,2"/>
    <line x1="260.5" y1="270" x2="260.5" y2="285" stroke="#333" stroke-width="0.4" stroke-dasharray="2,2"/>
    <text x="250" y="300" text-anchor="middle" font-size="9" font-weight="bold">7 mm</text>
    <text x="250" y="312" text-anchor="middle" font-size="8" fill="#666">(web thickness)</text>
  </g>

  <!-- ==================== LABELS ==================== -->
  <g font-family="Helvetica,Arial,sans-serif">
    <!-- Flange label -->
    <line x1="200" y1="100" x2="100" y2="130" stroke="#c0392b" stroke-width="0.6"/>
    <text x="95" y="130" text-anchor="end" font-size="9" fill="#c0392b" font-weight="bold">Flange</text>

    <!-- Web label -->
    <line x1="250" y1="200" x2="330" y2="235" stroke="#c0392b" stroke-width="0.6"/>
    <text x="335" y="238" font-size="9" fill="#c0392b" font-weight="bold">Web</text>
  </g>

  <!-- ==================== MATERIAL NOTE ==================== -->
  <g font-family="Helvetica,Arial,sans-serif">
    <text x="250" y="360" text-anchor="middle" font-size="10" fill="#555">Material: ASTM A36 structural steel</text>
    <text x="250" y="376" text-anchor="middle" font-size="10" fill="#555">Fy = 250 MPa (36 ksi) · Fu = 400 MPa (58 ksi)</text>
  </g>

  <!-- NOT TO SCALE note -->
  <rect x="195" y="400" width="110" height="22" fill="none" stroke="#999" stroke-width="0.8" rx="3"/>
  <text x="250" y="415" text-anchor="middle" font-size="10" fill="#999" font-family="Helvetica,Arial,sans-serif" font-style="italic">NOT TO SCALE</text>

  <!-- Legend -->
  <g transform="translate(150, 435)" font-family="Helvetica,Arial,sans-serif" font-size="8" fill="#555">
    <rect x="0" y="0" width="200" height="14" fill="white" stroke="#ddd" stroke-width="0.5" rx="3"/>
    <rect x="10" y="3" width="12" height="7" fill="#c0392b" opacity="0.9" rx="1"/><text x="28" y="10">Steel T 60×60 — #c0392b</text>
  </g>
</svg>
