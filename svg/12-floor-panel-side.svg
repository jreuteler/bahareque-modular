    <circle cx="260" cy="98" r="0.8"/><circle cx="350" cy="123" r="1"/>
    <circle cx="430" cy="108" r="1.1"/><circle cx="510" cy="128" r="0.9"/>
    <circle cx="590" cy="113" r="1"/><circle cx="130" cy="138" r="1.2"/>
