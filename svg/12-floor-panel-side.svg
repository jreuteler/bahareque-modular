  <line x1="400" y1="555" x2="750" y2="555" stroke="#3a7db8" stroke-width="0.3"/>
  <line x1="400" y1="551" x2="400" y2="559" stroke="#3a7db8" stroke-width="0.5"/>
  <text x="225" y="554" text-anchor="middle" font-size="5" fill="#3a7db8" font-family="Helvetica,Arial,sans-serif">2.5m arch</text>
  <text x="575" y="554" text-anchor="middle" font-size="5" fill="#3a7db8" font-family="Helvetica,Arial,sans-serif">2.5m arch</text>

