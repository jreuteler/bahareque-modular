<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" style="background:#ffffff">
  <rect width="100%" height="100%" fill="white"/>
  <text x="250" y="18" text-anchor="middle" font-size="12" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">Wall Panel Frame — T 60×60</text>
  <text x="250" y="32" text-anchor="middle" font-size="7" fill="#999" font-family="Helvetica,Arial,sans-serif">Side T-bars extend 30mm past top/bottom T-bars · Protruding webs for connector bolting · NOT TO SCALE</text>

  <!-- Frame: 1m wide × 2.5m tall (shown as 200px × 500px) -->
  <!-- Side T-bars: 2560mm total (2500 + 30mm top + 30mm bottom) -->
  <!-- Top/bottom T-bars: 1000mm, welded 30mm from side T-bar ends -->

  <!-- SIDE T-BARS (full length including protrusions) -->
  <!-- Left side T-bar -->
  <rect x="98" y="60" width="4" height="560" fill="#c0392b" opacity="0.7" stroke="#922b20" stroke-width="0.5"/>
  <!-- Left flange (at panel face) -->
  <rect x="90" y="90" width="16" height="500" fill="#c0392b" opacity="0.4"/>
  <!-- Right side T-bar -->
  <rect x="298" y="60" width="4" height="560" fill="#c0392b" opacity="0.7" stroke="#922b20" stroke-width="0.5"/>
  <!-- Right flange -->
  <rect x="294" y="90" width="16" height="500" fill="#c0392b" opacity="0.4"/>

  <!-- TOP T-BAR (welded 30mm from side T-bar top end) -->
  <rect x="98" y="90" width="204" height="4" fill="#c0392b" opacity="0.7" stroke="#922b20" stroke-width="0.5"/>
  <!-- Top flange -->
  <rect x="98" y="85" width="204" height="12" fill="#c0392b" opacity="0.3"/>

  <!-- BOTTOM T-BAR (welded 30mm from side T-bar bottom end) -->
  <rect x="98" y="586" width="204" height="4" fill="#c0392b" opacity="0.7" stroke="#922b20" stroke-width="0.5"/>
  <!-- Bottom flange -->
  <rect x="98" y="583" width="204" height="12" fill="#c0392b" opacity="0.3"/>

  <!-- PROTRUDING WEBS (30mm = 30px above top T-bar, 30px below bottom T-bar) -->
  <!-- Highlighted zone — top protrusions -->
  <rect x="92" y="60" width="16" height="30" fill="#c0392b" opacity="0.15" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="292" y="60" width="16" height="30" fill="#c0392b" opacity="0.15" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Highlighted zone — bottom protrusions -->
  <rect x="92" y="590" width="16" height="30" fill="#c0392b" opacity="0.15" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="292" y="590" width="16" height="30" fill="#c0392b" opacity="0.15" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- MORTAR ZONE (between top and bottom T-bars) shown as light fill -->
  <rect x="102" y="94" width="196" height="492" fill="#d4c4a8" opacity="0.1" stroke="none"/>

  <!-- WELD SYMBOLS at corners -->
  <g fill="#ff6600" opacity="0.6">
    <circle cx="100" cy="92" r="3"/>
    <circle cx="300" cy="92" r="3"/>
    <circle cx="100" cy="588" r="3"/>
    <circle cx="300" cy="588" r="3"/>
  </g>

  <!-- BOLT HOLES in protruding webs (for connector) -->
  <g fill="none" stroke="#555" stroke-width="1">
    <circle cx="100" cy="70" r="3"/>
    <circle cx="100" cy="80" r="3"/>
    <circle cx="300" cy="70" r="3"/>
    <circle cx="300" cy="80" r="3"/>
    <circle cx="100" cy="600" r="3"/>
    <circle cx="100" cy="610" r="3"/>
    <circle cx="300" cy="600" r="3"/>
    <circle cx="300" cy="610" r="3"/>
  </g>

  <!-- DIMENSIONS -->
  <!-- Panel height (between top/bottom T-bars) -->
  <line x1="340" y1="90" x2="340" y2="590" stroke="#333" stroke-width="0.5"/>
  <line x1="336" y1="90" x2="344" y2="90" stroke="#333" stroke-width="0.5"/>
  <line x1="336" y1="590" x2="344" y2="590" stroke="#333" stroke-width="0.5"/>
  <text x="350" y="345" font-size="7" fill="#333" font-family="Helvetica,Arial,sans-serif">2,500 mm panel height</text>
  <text x="350" y="355" font-size="6" fill="#333" font-family="Helvetica,Arial,sans-serif">(mortar poured to here)</text>

  <!-- Total side T-bar length -->
  <line x1="370" y1="60" x2="370" y2="620" stroke="#c0392b" stroke-width="0.5"/>
  <line x1="366" y1="60" x2="374" y2="60" stroke="#c0392b" stroke-width="0.5"/>
  <line x1="366" y1="620" x2="374" y2="620" stroke="#c0392b" stroke-width="0.5"/>
  <text x="380" y="345" font-size="7" fill="#c0392b" font-family="Helvetica,Arial,sans-serif">2,560 mm side T-bar</text>
  <text x="380" y="355" font-size="6" fill="#c0392b" font-family="Helvetica,Arial,sans-serif">(+30mm each end)</text>

  <!-- Protrusion dimension (top) -->
  <line x1="55" y1="60" x2="55" y2="90" stroke="#555" stroke-width="0.5"/>
  <line x1="51" y1="60" x2="59" y2="60" stroke="#555" stroke-width="0.5"/>
  <line x1="51" y1="90" x2="59" y2="90" stroke="#555" stroke-width="0.5"/>
  <text x="45" y="78" text-anchor="end" font-size="6" fill="#555" font-family="Helvetica,Arial,sans-serif">30mm</text>
  <text x="45" y="86" text-anchor="end" font-size="5" fill="#555" font-family="Helvetica,Arial,sans-serif">protrusion</text>

  <!-- Panel width -->
  <line x1="90" y1="640" x2="310" y2="640" stroke="#333" stroke-width="0.5"/>
  <line x1="90" y1="636" x2="90" y2="644" stroke="#333" stroke-width="0.5"/>
  <line x1="310" y1="636" x2="310" y2="644" stroke="#333" stroke-width="0.5"/>
  <text x="200" y="653" text-anchor="middle" font-size="7" fill="#333" font-family="Helvetica,Arial,sans-serif">1,000 mm panel width</text>

  <!-- LABELS -->
  <g font-family="Helvetica,Arial,sans-serif">
    <text x="200" y="55" text-anchor="middle" font-size="6" fill="#555">protruding web (exposed, never mortar-encased)</text>
    <text x="200" y="632" text-anchor="middle" font-size="6" fill="#555">protruding web (exposed, for connector bolts)</text>
    <text x="200" y="345" text-anchor="middle" font-size="8" fill="#888">mortar zone</text>
    <text x="60" y="70" text-anchor="end" font-size="6" fill="#555">M12 bolt holes →</text>
  </g>

  <!-- LEGEND -->
  <g transform="translate(50, 665)" font-family="Helvetica,Arial,sans-serif" font-size="6" fill="#555">
    <rect x="0" y="0" width="400" height="20" fill="white" stroke="#ddd" stroke-width="0.5" rx="3"/>
    <rect x="10" y="5" width="8" height="4" fill="#c0392b" opacity="0.7"/><text x="22" y="10">T 60×60 steel</text>
    <circle cx="100" cy="7" r="3" fill="#ff6600" opacity="0.6"/><text x="108" y="10">Weld at corner</text>
    <circle cx="190" cy="7" r="3" fill="none" stroke="#555" stroke-width="1"/><text x="198" y="10">Bolt hole (M12)</text>
    <rect x="270" y="5" width="8" height="4" fill="#c0392b" opacity="0.15" stroke="#c0392b" stroke-width="0.5" stroke-dasharray="2,1"/><text x="282" y="10">Protrusion zone</text>
  </g>
</svg>
