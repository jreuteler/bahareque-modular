<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 820" style="background:#fafafa">
  <text x="225" y="22" text-anchor="middle" font-size="13" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">Diagonal Bracing — Face View</text>
  <text x="225" y="38" text-anchor="middle" font-size="9" fill="#888" font-family="Helvetica,Arial,sans-serif">1.0 m × 2.5 m · Front strips solid · Rear diagonal dashed</text>

  <!-- Panel: x=90-340 (250px = 1m), y=55-680 (625px = 2.5m) -->

  <!-- T-bar frame -->
  <rect x="90" y="55" width="250" height="625" fill="none" stroke="#c0392b" stroke-width="3"/>

  <!-- Top HDPE block -->
  <rect x="93" y="58" width="244" height="18" fill="#4a90a8" opacity="0.3" stroke="#2a7088" stroke-width="1"/>
  <!-- Top-left notch -->
  <rect x="93" y="66" width="10" height="10" fill="#fafafa" stroke="#2a7088" stroke-width="0.5"/>
  <!-- Top-right notch -->
  <rect x="327" y="66" width="10" height="10" fill="#fafafa" stroke="#2a7088" stroke-width="0.5"/>

  <!-- Bottom HDPE block -->
  <rect x="93" y="659" width="244" height="18" fill="#4a90a8" opacity="0.3" stroke="#2a7088" stroke-width="1"/>
  <!-- Bottom-right notch -->
  <rect x="327" y="659" width="10" height="10" fill="#fafafa" stroke="#2a7088" stroke-width="0.5"/>
  <!-- Bottom-left notch -->
  <rect x="93" y="659" width="10" height="10" fill="#fafafa" stroke="#2a7088" stroke-width="0.5"/>

  <!-- Zone shading -->
  <!-- Top block zone -->
  <rect x="93" y="58" width="244" height="55" fill="#4a90a8" opacity="0.04"/>
  <!-- Center flex zone -->
  <rect x="93" y="113" width="244" height="510" fill="#8B5A2B" opacity="0.02"/>
  <!-- Bottom block zone -->
  <rect x="93" y="623" width="244" height="55" fill="#4a90a8" opacity="0.04"/>

  <!-- VERTICAL BAMBOO STRIPS (front side) -->
  <g fill="#8B5A2B" opacity="0.45">
    <rect x="115" y="76" width="5" height="583"/>
    <rect x="133" y="76" width="5" height="583"/>
    <rect x="151" y="76" width="5" height="583"/>
    <rect x="169" y="76" width="5" height="583"/>
    <rect x="187" y="76" width="5" height="583"/>
    <rect x="205" y="76" width="5" height="583"/>
    <rect x="223" y="76" width="5" height="583"/>
    <rect x="241" y="76" width="5" height="583"/>
    <rect x="259" y="76" width="5" height="583"/>
    <rect x="277" y="76" width="5" height="583"/>
    <rect x="295" y="76" width="5" height="583"/>
    <rect x="313" y="76" width="5" height="583"/>
  </g>

  <!-- FRONT DIAGONAL (solid, bottom-left to top-right) -->
  <line x1="98" y1="668" x2="332" y2="67" stroke="#8B5A2B" stroke-width="5" opacity="0.7" stroke-linecap="round"/>

  <!-- REAR DIAGONAL (dashed, top-left to bottom-right) -->
  <line x1="98" y1="67" x2="332" y2="668" stroke="#8B5A2B" stroke-width="5" opacity="0.25" stroke-dasharray="10,5" stroke-linecap="round"/>

  <!-- Wire ties at crossings (where front diagonal crosses each vertical strip) -->
  <g fill="none" stroke="#888" stroke-width="1.5">
    <circle cx="118" cy="645" r="4"/>
    <circle cx="136" cy="620" r="4"/>
    <circle cx="154" cy="593" r="4"/>
    <circle cx="172" cy="566" r="4"/>
    <circle cx="190" cy="539" r="4"/>
    <circle cx="208" cy="512" r="4"/>
    <circle cx="226" cy="485" r="4"/>
    <circle cx="244" cy="458" r="4"/>
    <circle cx="262" cy="431" r="4"/>
    <circle cx="280" cy="404" r="4"/>
    <circle cx="298" cy="377" r="4"/>
    <circle cx="316" cy="350" r="4"/>
  </g>

  <!-- Annotations (right side) -->
  <g font-family="Helvetica,Arial,sans-serif">
    <text x="350" y="72" font-size="7" fill="#2a7088">← HDPE block</text>
    <text x="350" y="82" font-size="6" fill="#888">notch anchors diagonal</text>

    <line x1="340" y1="120" x2="360" y2="120" stroke="#888" stroke-width="0.5"/>
    <text x="365" y="118" font-size="7" fill="#888">block zone</text>
    <text x="365" y="128" font-size="6" fill="#888">(strips 30 mm from web)</text>

    <line x1="340" y1="370" x2="360" y2="370" stroke="#888" stroke-width="0.5"/>
    <text x="365" y="365" font-size="7" fill="#888">flex zone )( </text>
    <text x="365" y="377" font-size="6" fill="#888">(strips bow toward web)</text>
    <text x="365" y="389" font-size="6" fill="#888">(mortar arch forms)</text>

    <line x1="340" y1="640" x2="360" y2="640" stroke="#888" stroke-width="0.5"/>
    <text x="365" y="638" font-size="7" fill="#888">block zone</text>

    <!-- Wire tie annotation -->
    <line x1="302" y1="377" x2="365" y2="420" stroke="#888" stroke-width="0.5"/>
    <text x="365" y="420" font-size="7" fill="#888">wire ties at crossings</text>
    <text x="365" y="432" font-size="6" fill="#888">(~12 per diagonal)</text>
  </g>

  <!-- Dimensions -->
  <line x1="70" y1="55" x2="70" y2="680" stroke="#333" stroke-width="0.5"/>
  <line x1="65" y1="55" x2="75" y2="55" stroke="#333" stroke-width="0.5"/>
  <line x1="65" y1="680" x2="75" y2="680" stroke="#333" stroke-width="0.5"/>
  <text x="60" y="370" text-anchor="end" font-size="9" fill="#333" font-family="Helvetica,Arial,sans-serif" transform="rotate(-90,60,370)">2.5 m (scalable)</text>

  <line x1="90" y1="700" x2="340" y2="700" stroke="#333" stroke-width="0.5"/>
  <line x1="90" y1="695" x2="90" y2="705" stroke="#333" stroke-width="0.5"/>
  <line x1="340" y1="695" x2="340" y2="705" stroke="#333" stroke-width="0.5"/>
  <text x="215" y="715" text-anchor="middle" font-size="9" fill="#333" font-family="Helvetica,Arial,sans-serif">1.0 m</text>

  <!-- Legend -->
  <g transform="translate(70, 740)" font-family="Helvetica,Arial,sans-serif">
    <rect x="0" y="0" width="310" height="55" fill="white" stroke="#ddd" stroke-width="0.5" rx="4"/>
    <rect x="15" y="8" width="14" height="4" fill="#c0392b" opacity="0.7"/><text x="35" y="13" font-size="7" fill="#555">T-bar frame</text>
    <rect x="15" y="20" width="14" height="4" fill="#4a90a8" opacity="0.3"/><text x="35" y="25" font-size="7" fill="#555">HDPE blocks</text>
    <rect x="15" y="32" width="14" height="4" fill="#8B5A2B" opacity="0.45"/><text x="35" y="37" font-size="7" fill="#555">Bamboo strips</text>
    <line x1="160" y1="10" x2="185" y2="10" stroke="#8B5A2B" stroke-width="3" opacity="0.7"/><text x="192" y="13" font-size="7" fill="#555">Front diagonal</text>
    <line x1="160" y1="24" x2="185" y2="24" stroke="#8B5A2B" stroke-width="3" opacity="0.25" stroke-dasharray="5,3"/><text x="192" y="27" font-size="7" fill="#555">Rear diagonal</text>
    <circle cx="170" cy="40" r="4" fill="none" stroke="#888" stroke-width="1.5"/><text x="180" y="43" font-size="7" fill="#555">Wire ties</text>
  </g>
</svg>
