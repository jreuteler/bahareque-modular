<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" style="background:#ffffff">
  <rect width="100%" height="100%" fill="white"/>
  <text x="400" y="18" text-anchor="middle" font-size="12" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">Floor Panel — Side View Variants</text>
