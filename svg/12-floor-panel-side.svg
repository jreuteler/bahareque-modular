    <rect x="540" y="5" width="8" height="4" fill="#e8d8b0" opacity="0.45"/><text x="552" y="10">Mortar + fiber</text>
    <rect x="630" y="5" width="8" height="4" fill="#c67a3c" opacity="0.5"/><text x="642" y="10">Tiles</text>
