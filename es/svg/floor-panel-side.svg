  <!-- BAMBOO TIE BUNDLE (tracción, at bottom) -->
  <!-- 26 strips × 30×35mm in a single layer = 35mm deep bundle -->
  <rect x="105" y="218" width="590" height="35" fill="#5a7a3a" opacity="0.35" stroke="#3a5a2a" stroke-width="0.8"/>
  <!-- Individual strip lines -->
