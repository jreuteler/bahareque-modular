<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" style="background:#fafafa">
  <text x="350" y="22" text-anchor="middle" font-size="13" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">Panel Cross Section — Horizontal Cut</text>
  <text x="350" y="38" text-anchor="middle" font-size="9" fill="#888" font-family="Helvetica,Arial,sans-serif">~85 mm total wall thickness</text>

  <text x="130" y="65" text-anchor="middle" font-size="10" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">EXTERIOR</text>
  <text x="570" y="65" text-anchor="middle" font-size="10" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">INTERIOR</text>

  <!-- Layer visualization — zoomed cross-section, centered -->
  <!-- Exterior lime plaster -->
  <rect x="60" y="80" width="18" height="200" fill="#f5f0e0" stroke="#ddd" stroke-width="0.5"/>

  <!-- Exterior mortar -->
  <rect x="78" y="80" width="55" height="200" fill="#d4c4a8" opacity="0.5" stroke="#bbb" stroke-width="0.5"/>

  <!-- Exterior chicken wire -->
  <rect x="133" y="80" width="8" height="200" fill="none" stroke="#888" stroke-width="1"/>
  <g stroke="#888" stroke-width="0.4">
    <line x1="133" y1="90" x2="141" y2="100"/><line x1="141" y1="90" x2="133" y2="100"/>
    <line x1="133" y1="110" x2="141" y2="120"/><line x1="141" y1="110" x2="133" y2="120"/>
    <line x1="133" y1="130" x2="141" y2="140"/><line x1="141" y1="130" x2="133" y2="140"/>
    <line x1="133" y1="150" x2="141" y2="160"/><line x1="141" y1="150" x2="133" y2="160"/>
    <line x1="133" y1="170" x2="141" y2="180"/><line x1="141" y1="170" x2="133" y2="180"/>
    <line x1="133" y1="190" x2="141" y2="200"/><line x1="141" y1="190" x2="133" y2="200"/>
    <line x1="133" y1="210" x2="141" y2="220"/><line x1="141" y1="210" x2="133" y2="220"/>
    <line x1="133" y1="230" x2="141" y2="240"/><line x1="141" y1="230" x2="133" y2="240"/>
    <line x1="133" y1="250" x2="141" y2="260"/><line x1="141" y1="250" x2="133" y2="260"/>
  </g>

  <!-- Exterior aluminum mesh (optional) -->
  <rect x="141" y="80" width="6" height="200" fill="#a0c4ff" opacity="0.4" stroke="#6fa0d6" stroke-width="0.5"/>

  <!-- Exterior bamboo strips -->
  <rect x="147" y="80" width="16" height="200" fill="#8B5A2B" opacity="0.5" stroke="#6a4020" stroke-width="0.5"/>

  <!-- Center: steel frame + cables -->
  <rect x="163" y="80" width="55" height="200" fill="white" stroke="#eee" stroke-width="0.5"/>
  <!-- Steel web -->
  <rect x="186" y="80" width="10" height="200" fill="#c0392b" opacity="0.6"/>
  <!-- 12V cable -->
  <circle cx="174" cy="140" r="4" fill="#d4a017"/>
  <!-- 120V cable -->
  <circle cx="208" cy="140" r="5" fill="#2980b9"/>

  <!-- Interior bamboo strips -->
  <rect x="218" y="80" width="16" height="200" fill="#8B5A2B" opacity="0.5" stroke="#6a4020" stroke-width="0.5"/>

  <!-- Interior aluminum mesh -->
  <rect x="234" y="80" width="6" height="200" fill="#a0c4ff" opacity="0.4" stroke="#6fa0d6" stroke-width="0.5"/>

  <!-- Interior chicken wire -->
  <rect x="240" y="80" width="8" height="200" fill="none" stroke="#888" stroke-width="1"/>
  <g stroke="#888" stroke-width="0.4">
    <line x1="240" y1="90" x2="248" y2="100"/><line x1="248" y1="90" x2="240" y2="100"/>
    <line x1="240" y1="110" x2="248" y2="120"/><line x1="248" y1="110" x2="240" y2="120"/>
    <line x1="240" y1="130" x2="248" y2="140"/><line x1="248" y1="130" x2="240" y2="140"/>
    <line x1="240" y1="150" x2="248" y2="160"/><line x1="248" y1="150" x2="240" y2="160"/>
    <line x1="240" y1="170" x2="248" y2="180"/><line x1="248" y1="170" x2="240" y2="180"/>
    <line x1="240" y1="190" x2="248" y2="200"/><line x1="248" y1="190" x2="240" y2="200"/>
    <line x1="240" y1="210" x2="248" y2="220"/><line x1="248" y1="210" x2="240" y2="220"/>
    <line x1="240" y1="230" x2="248" y2="240"/><line x1="248" y1="230" x2="240" y2="240"/>
    <line x1="240" y1="250" x2="248" y2="260"/><line x1="248" y1="250" x2="240" y2="260"/>
  </g>

  <!-- Interior mortar -->
  <rect x="248" y="80" width="55" height="200" fill="#d4c4a8" opacity="0.5" stroke="#bbb" stroke-width="0.5"/>

  <!-- Interior lime plaster -->
  <rect x="303" y="80" width="18" height="200" fill="#f5f0e0" stroke="#ddd" stroke-width="0.5"/>

  <!-- Layer labels (right side) -->
  <g font-size="8" fill="#555" font-family="Helvetica,Arial,sans-serif">
    <line x1="325" y1="90" x2="370" y2="90" stroke="#ddd" stroke-width="0.5"/>
    <text x="375" y="93">1 — Lime plaster (3–5 mm)</text>

    <line x1="325" y1="115" x2="370" y2="115" stroke="#ddd" stroke-width="0.5"/>
    <text x="375" y="118">2 — Cement mortar (~15 mm)</text>

    <line x1="325" y1="140" x2="370" y2="140" stroke="#ddd" stroke-width="0.5"/>
    <text x="375" y="143">3 — Chicken wire mesh</text>

    <line x1="325" y1="160" x2="370" y2="160" stroke="#ddd" stroke-width="0.5"/>
    <text x="375" y="163" fill="#4a86c8">4 — Fine aluminum mesh (optional, insect/dust barrier)</text>

    <line x1="325" y1="180" x2="370" y2="180" stroke="#ddd" stroke-width="0.5"/>
    <text x="375" y="183" fill="#8B5A2B">5 — Bamboo strips (~20 mm)</text>

    <line x1="325" y1="200" x2="370" y2="200" stroke="#ddd" stroke-width="0.5"/>
    <text x="375" y="203" fill="#c0392b">6 — Steel T-bar web + cables</text>

    <line x1="325" y1="225" x2="370" y2="225" stroke="#ddd" stroke-width="0.5"/>
    <text x="375" y="228">Symmetrical — same layers both sides</text>
  </g>

  <!-- Dimension line -->
  <line x1="60" y1="295" x2="321" y2="295" stroke="#333" stroke-width="0.5"/>
  <line x1="60" y1="290" x2="60" y2="300" stroke="#333" stroke-width="0.5"/>
  <line x1="321" y1="290" x2="321" y2="300" stroke="#333" stroke-width="0.5"/>
  <text x="190" y="315" text-anchor="middle" font-size="10" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">~85 mm</text>

  <!-- Color legend -->
  <g transform="translate(50, 345)" font-family="Helvetica,Arial,sans-serif" font-size="7" fill="#555">
    <rect x="0" y="0" width="600" height="40" fill="white" stroke="#ddd" stroke-width="0.5" rx="4"/>
    <rect x="15" y="8" width="10" height="7" fill="#f5f0e0" stroke="#ddd" stroke-width="0.5"/><text x="30" y="14">Lime plaster</text>
    <rect x="95" y="8" width="10" height="7" fill="#d4c4a8" opacity="0.5"/><text x="110" y="14">Mortar</text>
    <rect x="155" y="8" width="10" height="7" fill="#888" opacity="0.3"/><text x="170" y="14">Chicken wire</text>
    <rect x="235" y="8" width="10" height="7" fill="#a0c4ff" opacity="0.4"/><text x="250" y="14">Al mesh</text>
    <rect x="295" y="8" width="10" height="7" fill="#8B5A2B" opacity="0.5"/><text x="310" y="14">Bamboo</text>
    <rect x="365" y="8" width="10" height="7" fill="#c0392b" opacity="0.6"/><text x="380" y="14">Steel frame</text>
    <circle cx="450" cy="12" r="4" fill="#d4a017"/><text x="460" y="14">12V</text>
    <circle cx="500" cy="12" r="4" fill="#2980b9"/><text x="510" y="14">120V</text>

    <text x="15" y="32">Optional aluminum mesh adds insect/dust barrier + secondary RF attenuation</text>
  </g>
</svg>
