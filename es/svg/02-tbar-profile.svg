<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 620" style="background:#ffffff">
  <rect width="100%" height="100%" fill="white"/>
  <text x="350" y="22" text-anchor="middle" font-size="13" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">Perfil T — Secciones Transversales</text>
  <text x="350" y="38" text-anchor="middle" font-size="9" fill="#888" font-family="Helvetica,Arial,sans-serif">Top/bottom bars have 85 mm web · Side bars have 30 mm web · Flange always faces mortar</text>

  <!-- ==================== TOP/BOTTOM T-BAR (85mm web) ==================== -->
  <text x="175" y="65" text-anchor="middle" font-size="11" fill="#555" font-weight="bold" font-family="Helvetica,Arial,sans-serif">Perfil T Superior / Inferior</text>
  <text x="175" y="78" text-anchor="middle" font-size="8" fill="#888" font-family="Helvetica,Arial,sans-serif">(85 mm web — horizontal structural depth)</text>

  <!-- Scale: ~1.5px per mm. Flange 30mm=45px, web 85mm=128px, 3mm=4.5px -->

  <!-- Flange (faces outward = mortar side = top in this view) -->
  <rect x="100" y="95" width="150" height="12" fill="#c0392b" stroke="#911" stroke-width="1" rx="1"/>

  <!-- Web (extends inward) -->
  <rect x="167" y="107" width="12" height="170" fill="#c0392b" stroke="#911" stroke-width="1"/>

  <!-- Cross-section cut through the top T-bar (cutting perpendicular to bar length) -->
  <!-- Order from web outward: Web → HDPE → Bamboo (vertical, seen as cross-section) → Tira de sujeción -->
  <!-- One screw visible at this cut location -->

  <!-- HDPE blocks (contra alma, both sides) -->
  <!-- Exterior side (left of web) -->
  <rect x="135" y="107" width="30" height="28" fill="#4a90a8" opacity="0.35" stroke="#2a7088" stroke-width="1" rx="1"/>
  <!-- Notch at bottom of HDPE (deepest into wall, at web level) — only at corners -->
  <rect x="155" y="127" width="10" height="8" fill="#1a3a6a" opacity="0.7" stroke="#0d1f3c" stroke-width="0.5"/>
  <!-- Interior side (right of web) -->
  <rect x="181" y="107" width="30" height="28" fill="#4a90a8" opacity="0.35" stroke="#2a7088" stroke-width="1" rx="1"/>
  <rect x="181" y="127" width="10" height="8" fill="#1a3a6a" opacity="0.7" stroke="#0d1f3c" stroke-width="0.5"/>

  <!-- Bamboo vertical strips (run full web height, starting below flange) -->
  <!-- Exterior side — between HDPE and clamping strip -->
  <rect x="125" y="107" width="8" height="170" fill="#8B5A2B" opacity="0.4" stroke="#6a4020" stroke-width="0.5"/>
  <!-- Interior side -->
  <rect x="213" y="107" width="8" height="170" fill="#8B5A2B" opacity="0.4" stroke="#6a4020" stroke-width="0.5"/>

  <!-- Tira de sujeción (outermost, only at HDPE block height — clamps strips at top/bottom) -->
  <rect x="119" y="107" width="4" height="30" fill="#555" opacity="0.7" stroke="#333" stroke-width="0.5"/>
  <rect x="223" y="107" width="4" height="30" fill="#555" opacity="0.7" stroke="#333" stroke-width="0.5"/>

  <!-- ONE screw visible at this cross-section cut -->
  <!-- Exterior: clamp → bamboo → HDPE → web -->
  <line x1="121" y1="120" x2="167" y2="120" stroke="#333" stroke-width="1.5"/>
  <circle cx="121" cy="120" r="2.5" fill="#333"/>
  <!-- Interior: reverse -->
  <line x1="225" y1="120" x2="179" y2="120" stroke="#333" stroke-width="1.5"/>
  <circle cx="225" cy="120" r="2.5" fill="#333"/>

  <!-- Notch annotation -->
  <line x1="160" y1="135" x2="160" y2="155" stroke="#2a7088" stroke-width="0.5"/>
  <text x="160" y="165" text-anchor="middle" font-size="6" fill="#2a7088" font-family="Helvetica,Arial,sans-serif">muesca para diagonal</text>
  <text x="160" y="175" text-anchor="middle" font-size="6" fill="#888" font-family="Helvetica,Arial,sans-serif">(solo esquinas)</text>

  <!-- Dimension lines -->

  <!-- Flange thickness: 3mm (vertical, top edge) -->
  <line x1="260" y1="95" x2="280" y2="95" stroke="#333" stroke-width="0.5"/>
  <line x1="260" y1="107" x2="280" y2="107" stroke="#333" stroke-width="0.5"/>
  <line x1="270" y1="95" x2="270" y2="107" stroke="#333" stroke-width="0.5"/>
  <text x="290" y="104" font-size="8" fill="#333" font-family="Helvetica,Arial,sans-serif">3 mm (flange thickness)</text>



  <!-- Web thickness: 3mm (horizontal, at bottom) -->
  <line x1="167" y1="285" x2="179" y2="285" stroke="#333" stroke-width="0.5"/>
  <text x="173" y="298" text-anchor="middle" font-size="7" fill="#333" font-family="Helvetica,Arial,sans-serif">3 mm (web thickness)</text>

  <!-- Labels -->
  <g font-family="Helvetica,Arial,sans-serif">
    <text x="270" y="120" font-size="8" fill="#c0392b">← Flange — faces mortar (exterior)</text>
    <text x="270" y="145" font-size="8" fill="#c0392b">← Web — extends into wall (85 mm deep)</text>

    <line x1="135" y1="120" x2="100" y2="115" stroke="#4a90a8" stroke-width="0.5"/>
    <text x="20" y="110" font-size="7" fill="#4a90a8">HDPE block →</text>
    <text x="20" y="121" font-size="6" fill="#888">contra alma, spaces strips 30 mm out</text>

    <line x1="119" y1="125" x2="100" y2="140" stroke="#555" stroke-width="0.5"/>
    <text x="20" y="140" font-size="7" fill="#555">clamping strip →</text>
    <text x="20" y="151" font-size="6" fill="#888">outermost, screws through all layers</text>

    <line x1="125" y1="116" x2="100" y2="168" stroke="#8B5A2B" stroke-width="0.5"/>
    <text x="20" y="168" font-size="7" fill="#8B5A2B">tiras de bambú →</text>
    <text x="20" y="179" font-size="6" fill="#888">vertical, between HDPE and clamp</text>
    <text x="20" y="189" font-size="6" fill="#888">(seen in cross-section here)</text>

    <line x1="121" y1="120" x2="100" y2="205" stroke="#333" stroke-width="0.5"/>
    <text x="20" y="207" font-size="7" fill="#333">screw →</text>
    <text x="20" y="218" font-size="6" fill="#888">clamp → bamboo → HDPE → web</text>
  </g>

  <!-- ==================== SIDE T-BAR (30mm web) ==================== -->
  <text x="530" y="65" text-anchor="middle" font-size="11" fill="#555" font-weight="bold" font-family="Helvetica,Arial,sans-serif">Perfil T Lateral</text>
  <text x="530" y="78" text-anchor="middle" font-size="8" fill="#888" font-family="Helvetica,Arial,sans-serif">(30 mm web — vertical edges)</text>

  <!-- Flange -->
  <rect x="460" y="95" width="140" height="12" fill="#c0392b" stroke="#911" stroke-width="1" rx="1"/>

  <!-- Web (shorter: 30mm = 45px) -->
  <rect x="523" y="107" width="12" height="45" fill="#c0392b" stroke="#911" stroke-width="1"/>

  <!-- Dimensions -->

  <!-- Web height: 30mm -->
  <line x1="445" y1="95" x2="445" y2="152" stroke="#333" stroke-width="0.5"/>
  <line x1="440" y1="95" x2="450" y2="95" stroke="#333" stroke-width="0.5"/>
  <line x1="440" y1="152" x2="450" y2="152" stroke="#333" stroke-width="0.5"/>
  <text x="435" y="127" text-anchor="end" font-size="8" fill="#333" font-family="Helvetica,Arial,sans-serif">30 mm</text>

  <!-- Note -->
  <text x="530" y="175" text-anchor="middle" font-size="7" fill="#888" font-family="Helvetica,Arial,sans-serif">Perfil T Laterals frame the panel edges.</text>
  <text x="530" y="187" text-anchor="middle" font-size="7" fill="#888" font-family="Helvetica,Arial,sans-serif">No clamping holes — tiras de bambú</text>
  <text x="530" y="199" text-anchor="middle" font-size="7" fill="#888" font-family="Helvetica,Arial,sans-serif">are clamped at top/bottom only.</text>

  <!-- ==================== ASSEMBLY CONTEXT ==================== -->
  <text x="350" y="340" text-anchor="middle" font-size="11" fill="#555" font-weight="bold" font-family="Helvetica,Arial,sans-serif">En Contexto — Corte Horizontal del Panel</text>
  <text x="350" y="355" text-anchor="middle" font-size="8" fill="#888" font-family="Helvetica,Arial,sans-serif">Vista superior at a top/bottom T-bar · Flange flush with mortar face</text>

  <!-- Scale: 2px/mm. 85mm=170px wide. 30mm flange=60px. 3mm=6px -->
  <!-- Center assembly at x=250. Ext face x=165, Int face x=335 -->
  <g transform="translate(0, 370)">
    <!-- Mortar background (fills everything within the T-bar boundary, encasing all components) -->
    <!-- 85mm wall = 170px. From x=165 (ext face) to x=335 (int face) -->
    <rect x="165" y="0" width="170" height="210" fill="#d4c4a8" opacity="0.45" rx="1"/>

    <!-- Flange (30mm=60px wide, 3mm=6px thick, at exterior face) -->
    <rect x="180" y="0" width="140" height="6" fill="#c0392b" stroke="#911" stroke-width="0.8"/>

    <!-- Web (3mm=6px wide, extends 85mm=170px inward from exterior face) -->
    <rect x="247" y="6" width="6" height="204" fill="#c0392b" stroke="#911" stroke-width="0.5"/>

    <!-- HDPE blocks (contra alma, altura completa, both sides) -->
    <rect x="213" y="8" width="32" height="200" fill="#4a90a8" opacity="0.2" stroke="#2a7088" stroke-width="0.8"/>
    <rect x="255" y="8" width="32" height="200" fill="#4a90a8" opacity="0.2" stroke="#2a7088" stroke-width="0.8"/>
    <!-- Notch left of alma (right below flange) -->
    <rect x="237" y="8" width="10" height="10" fill="#1a3a6a" opacity="0.7" stroke="#0d1f3c" stroke-width="0.5"/>
    <!-- Notch right of web -->
    <rect x="255" y="8" width="10" height="10" fill="#1a3a6a" opacity="0.7" stroke="#0d1f3c" stroke-width="0.5"/>

    <!-- Tiras de bambú (between HDPE and clamp, cross-section) -->
    <g fill="#8B5A2B" opacity="0.5" stroke="#6a4020" stroke-width="0.4">
      <!-- Exterior side -->
      <rect x="195" y="12" width="16" height="12"/>
      <rect x="195" y="30" width="16" height="12"/>
      <rect x="195" y="48" width="16" height="12"/>
      <rect x="195" y="66" width="16" height="12"/>
      <rect x="195" y="84" width="16" height="12"/>
      <rect x="195" y="102" width="16" height="12"/>
      <rect x="195" y="120" width="16" height="12"/>
      <rect x="195" y="138" width="16" height="12"/>
      <rect x="195" y="156" width="16" height="12"/>
      <rect x="195" y="174" width="16" height="12"/>
      <rect x="195" y="192" width="16" height="12"/>
      <!-- Interior side -->
      <rect x="289" y="12" width="16" height="12"/>
      <rect x="289" y="30" width="16" height="12"/>
      <rect x="289" y="48" width="16" height="12"/>
      <rect x="289" y="66" width="16" height="12"/>
      <rect x="289" y="84" width="16" height="12"/>
      <rect x="289" y="102" width="16" height="12"/>
      <rect x="289" y="120" width="16" height="12"/>
      <rect x="289" y="138" width="16" height="12"/>
      <rect x="289" y="156" width="16" height="12"/>
      <rect x="289" y="174" width="16" height="12"/>
      <rect x="289" y="192" width="16" height="12"/>
    </g>

    <!-- Tira de sujecións (outermost, altura completa) -->
    <rect x="189" y="6" width="4" height="204" fill="#555" opacity="0.6" stroke="#333" stroke-width="0.4"/>
    <rect x="307" y="6" width="4" height="204" fill="#555" opacity="0.6" stroke="#333" stroke-width="0.4"/>

    <!-- Screws every 2nd gap (~70mm) -->
    <!-- Exterior: clamp → bamboo → HDPE → web -->
    <g stroke="#333" stroke-width="0.8">
      <line x1="191" y1="26" x2="247" y2="26"/>
      <line x1="191" y1="62" x2="247" y2="62"/>
      <line x1="191" y1="98" x2="247" y2="98"/>
      <line x1="191" y1="134" x2="247" y2="134"/>
      <line x1="191" y1="170" x2="247" y2="170"/>
      <line x1="191" y1="205" x2="247" y2="205"/>
    </g>
    <g fill="#333">
      <circle cx="191" cy="26" r="1.3"/><circle cx="191" cy="62" r="1.3"/>
      <circle cx="191" cy="98" r="1.3"/><circle cx="191" cy="134" r="1.3"/>
      <circle cx="191" cy="170" r="1.3"/><circle cx="191" cy="205" r="1.3"/>
    </g>
    <!-- Interior -->
    <g stroke="#333" stroke-width="0.8">
      <line x1="309" y1="26" x2="253" y2="26"/>
      <line x1="309" y1="62" x2="253" y2="62"/>
      <line x1="309" y1="98" x2="253" y2="98"/>
      <line x1="309" y1="134" x2="253" y2="134"/>
      <line x1="309" y1="170" x2="253" y2="170"/>
      <line x1="309" y1="205" x2="253" y2="205"/>
    </g>
    <g fill="#333">
      <circle cx="309" cy="26" r="1.3"/><circle cx="309" cy="62" r="1.3"/>
      <circle cx="309" cy="98" r="1.3"/><circle cx="309" cy="134" r="1.3"/>
      <circle cx="309" cy="170" r="1.3"/><circle cx="309" cy="205" r="1.3"/>
    </g>

    <!-- Labels -->
    <text x="140" y="8" text-anchor="end" font-size="8" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">EXT</text>
    <text x="360" y="8" font-size="8" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">INT</text>

    <g font-family="Helvetica,Arial,sans-serif">
      <text x="370" y="8" font-size="7" fill="#c0392b">← ala (30 mm)</text>
      <text x="370" y="24" font-size="7" fill="#c0392b">← alma (3 mm, 85 mm deep)</text>
      <text x="370" y="44" font-size="7" fill="#4a90a8">← HDPE (altura completa, contra alma)</text>
      <text x="370" y="60" font-size="7" fill="#2a7088">← muesca para diagonal (solo esquinas)</text>
      <text x="370" y="80" font-size="7" fill="#8B5A2B">← tiras de bambú (cross-section)</text>
      <text x="370" y="100" font-size="7" fill="#555">← tiras de sujeción</text>
      <text x="370" y="120" font-size="7" fill="#333">← tornillos: clamp → bamboo → HDPE → web</text>
      <text x="370" y="140" font-size="7" fill="#888">← mortero encapsula todo</text>
    </g>

    <!-- Dimension: 85mm wall -->
    <line x1="165" y1="218" x2="335" y2="218" stroke="#333" stroke-width="0.5"/>
    <line x1="165" y1="214" x2="165" y2="222" stroke="#333" stroke-width="0.5"/>
    <line x1="335" y1="214" x2="335" y2="222" stroke="#333" stroke-width="0.5"/>
    <text x="250" y="232" text-anchor="middle" font-size="8" fill="#333" font-family="Helvetica,Arial,sans-serif">85 mm espesor del muro</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 600)" font-family="Helvetica,Arial,sans-serif" font-size="7" fill="#555">
    <rect x="0" y="0" width="600" height="16" fill="white" stroke="#ddd" stroke-width="0.5" rx="3"/>
    <rect x="15" y="4" width="10" height="6" fill="#c0392b" opacity="0.7"/><text x="30" y="9">Perfil T</text>
    <rect x="100" y="4" width="10" height="6" fill="#4a90a8" opacity="0.35"/><text x="115" y="9">HDPE</text>
    <rect x="160" y="4" width="10" height="6" fill="#8B5A2B" opacity="0.5"/><text x="175" y="9">Bambú</text>
    <rect x="230" y="4" width="10" height="6" fill="#555" opacity="0.6"/><text x="245" y="9">Sujeción</text>
    <circle cx="300" cy="7" r="2" fill="#333"/><text x="308" y="9">Tornillo</text>
    <rect x="345" y="4" width="10" height="6" fill="#d4c4a8" opacity="0.45"/><text x="360" y="9">Mortero</text>
    <rect x="415" y="4" width="10" height="6" fill="#1a3a6a" opacity="0.7"/><text x="430" y="9">Muesca (diagonal, solo esquinas)</text>
  </g>
</svg>
