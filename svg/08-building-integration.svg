<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" style="background:#fafafa">
  <text x="350" y="22" text-anchor="middle" font-size="13" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">Building Integration — Top-Down View</text>
  <text x="350" y="38" text-anchor="middle" font-size="9" fill="#888" font-family="Helvetica,Arial,sans-serif">Column inset · Panels flush with beam · No steel visible from exterior</text>

  <text x="80" y="70" text-anchor="middle" font-size="10" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">EXTERIOR</text>
  <text x="620" y="70" text-anchor="middle" font-size="10" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">INTERIOR</text>

  <!-- IPE beam (runs full width, outer flange at wall plane) -->
  <!-- Outer flange -->
  <rect x="80" y="95" width="520" height="6" fill="#2a2a2a" opacity="0.5" stroke="#111" stroke-width="0.5"/>
  <!-- Web -->
  <rect x="80" y="133" width="520" height="3" fill="#2a2a2a" opacity="0.4"/>
  <!-- Inner flange -->
  <rect x="80" y="170" width="520" height="6" fill="#2a2a2a" opacity="0.5" stroke="#111" stroke-width="0.5"/>
  <text x="350" y="88" text-anchor="middle" font-size="8" fill="#2a2a2a" font-weight="bold" font-family="Helvetica,Arial,sans-serif">IPE beam (outer flange = wall plane)</text>

  <!-- LEFT PANEL -->
  <!-- Lime plaster exterior -->
  <rect x="80" y="97" width="245" height="4" fill="#f5f0e0" stroke="#ddd" stroke-width="0.3"/>
  <!-- Mortar exterior -->
  <rect x="80" y="101" width="245" height="10" fill="#d4c4a8" opacity="0.5"/>
  <!-- Bamboo -->
  <rect x="80" y="111" width="245" height="6" fill="#8B5A2B" opacity="0.4"/>
  <!-- Steel T-bar center -->
  <rect x="80" y="117" width="245" height="3" fill="#c0392b" opacity="0.4"/>
  <!-- Bamboo interior -->
  <rect x="80" y="120" width="245" height="6" fill="#8B5A2B" opacity="0.4"/>
  <!-- Mortar interior -->
  <rect x="80" y="126" width="245" height="10" fill="#d4c4a8" opacity="0.5"/>
  <!-- Lime plaster interior -->
  <rect x="80" y="136" width="245" height="4" fill="#f5f0e0" stroke="#ddd" stroke-width="0.3"/>

  <text x="200" y="122" text-anchor="middle" font-size="8" fill="#555" font-family="Helvetica,Arial,sans-serif">Panel</text>

  <!-- RIGHT PANEL -->
  <rect x="345" y="97" width="255" height="4" fill="#f5f0e0" stroke="#ddd" stroke-width="0.3"/>
  <rect x="345" y="101" width="255" height="10" fill="#d4c4a8" opacity="0.5"/>
  <rect x="345" y="111" width="255" height="6" fill="#8B5A2B" opacity="0.4"/>
  <rect x="345" y="117" width="255" height="3" fill="#c0392b" opacity="0.4"/>
  <rect x="345" y="120" width="255" height="6" fill="#8B5A2B" opacity="0.4"/>
  <rect x="345" y="126" width="255" height="10" fill="#d4c4a8" opacity="0.5"/>
  <rect x="345" y="136" width="255" height="4" fill="#f5f0e0" stroke="#ddd" stroke-width="0.3"/>

  <text x="470" y="122" text-anchor="middle" font-size="8" fill="#555" font-family="Helvetica,Arial,sans-serif">Panel</text>

  <!-- Panel joint line -->
  <line x1="335" y1="97" x2="335" y2="140" stroke="#aaa" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="335" y="150" text-anchor="middle" font-size="6" fill="#aaa" font-family="Helvetica,Arial,sans-serif">panels touch</text>
  <text x="335" y="158" text-anchor="middle" font-size="6" fill="#aaa" font-family="Helvetica,Arial,sans-serif">lime plaster covers joint</text>

  <!-- HEA COLUMN (inset behind panels) -->
  <!-- Exterior flange -->
  <rect x="296" y="140" width="78" height="8" fill="#2a2a2a" stroke="#111" stroke-width="0.5"/>
  <!-- Web -->
  <rect x="332" y="148" width="6" height="60" fill="#2a2a2a" stroke="#111" stroke-width="0.5"/>
  <!-- Interior flange -->
  <rect x="296" y="208" width="78" height="8" fill="#2a2a2a" stroke="#111" stroke-width="0.5"/>

  <!-- Bolt tabs on column -->
  <rect x="288" y="155" width="8" height="6" fill="#555" rx="1"/>
  <rect x="288" y="175" width="8" height="6" fill="#555" rx="1"/>
  <rect x="374" y="155" width="8" height="6" fill="#555" rx="1"/>
  <rect x="374" y="175" width="8" height="6" fill="#555" rx="1"/>

  <!-- Column labels -->
  <line x1="290" y1="220" x2="290" y2="245" stroke="#555" stroke-width="0.5"/>
  <text x="335" y="235" text-anchor="middle" font-size="8" fill="#2a2a2a" font-weight="bold" font-family="Helvetica,Arial,sans-serif">HEA column (inset)</text>
  <text x="335" y="248" text-anchor="middle" font-size="7" fill="#888" font-family="Helvetica,Arial,sans-serif">Exterior flange at panel interior face</text>
  <text x="335" y="260" text-anchor="middle" font-size="7" fill="#888" font-family="Helvetica,Arial,sans-serif">Fully hidden behind panels</text>

  <!-- Bolt tab annotation -->
  <line x1="285" y1="158" x2="240" y2="180" stroke="#555" stroke-width="0.5"/>
  <text x="235" y="183" text-anchor="end" font-size="7" fill="#555" font-family="Helvetica,Arial,sans-serif">bolt tabs (pre-welded)</text>
  <text x="235" y="193" text-anchor="end" font-size="6" fill="#888" font-family="Helvetica,Arial,sans-serif">panels bolt from interior</text>

  <!-- Flush exterior plane line -->
  <line x1="68" y1="95" x2="68" y2="145" stroke="#3a7d32" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="63" y="120" text-anchor="end" font-size="7" fill="#3a7d32" font-family="Helvetica,Arial,sans-serif" transform="rotate(-90,63,120)">wall plane</text>

  <!-- FRONT ELEVATION view -->
  <text x="350" y="300" text-anchor="middle" font-size="10" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">Front Elevation — At Column</text>
  <text x="350" y="314" text-anchor="middle" font-size="8" fill="#888" font-family="Helvetica,Arial,sans-serif">Looking at exterior wall face — no steel visible</text>

  <!-- Beam at top -->
  <rect x="80" y="330" width="540" height="8" fill="#2a2a2a" opacity="0.5" stroke="#111" stroke-width="0.5" rx="1"/>
  <text x="350" y="327" text-anchor="middle" font-size="7" fill="#2a2a2a" font-family="Helvetica,Arial,sans-serif">beam (outer flange visible at top)</text>

  <!-- Left panel face -->
  <rect x="80" y="342" width="250" height="100" fill="#f5f0e0" stroke="#ddd" stroke-width="1" rx="1"/>
  <text x="205" y="395" text-anchor="middle" font-size="9" fill="#bbb" font-family="Helvetica,Arial,sans-serif">Panel (plaster face)</text>

  <!-- Right panel face -->
  <rect x="350" y="342" width="270" height="100" fill="#f5f0e0" stroke="#ddd" stroke-width="1" rx="1"/>
  <text x="485" y="395" text-anchor="middle" font-size="9" fill="#bbb" font-family="Helvetica,Arial,sans-serif">Panel (plaster face)</text>

  <!-- Joint line -->
  <line x1="335" y1="342" x2="335" y2="442" stroke="#ddd" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Column behind (dashed, invisible) -->
  <rect x="310" y="342" width="50" height="100" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,2" opacity="0.2"/>
  <text x="335" y="378" text-anchor="middle" font-size="7" fill="#aaa" font-family="Helvetica,Arial,sans-serif">column</text>
  <text x="335" y="388" text-anchor="middle" font-size="7" fill="#aaa" font-family="Helvetica,Arial,sans-serif">(behind)</text>

  <!-- Result note -->
  <rect x="80" y="452" width="540" height="16" fill="white" stroke="#ddd" stroke-width="0.5" rx="3"/>
  <text x="350" y="463" text-anchor="middle" font-size="8" fill="#555" font-style="italic" font-family="Helvetica,Arial,sans-serif">Exterior: seamless plaster wall. No steel visible. Column fully hidden. Joints covered by lime plaster.</text>

  <!-- Legend -->
  <g transform="translate(80, 478)" font-family="Helvetica,Arial,sans-serif" font-size="7" fill="#555">
    <rect x="0" y="0" width="12" height="8" fill="#2a2a2a" opacity="0.5"/><text x="18" y="7">Steel (beam/column)</text>
    <rect x="130" y="0" width="12" height="8" fill="#f5f0e0" stroke="#ddd" stroke-width="0.5"/><text x="148" y="7">Panel (lime plaster face)</text>
    <rect x="290" y="0" width="12" height="8" fill="#555"/><text x="308" y="7">Bolt tabs</text>
    <rect x="380" y="0" width="12" height="8" fill="#d4c4a8" opacity="0.5"/><text x="398" y="7">Mortar</text>
    <rect x="450" y="0" width="12" height="8" fill="#8B5A2B" opacity="0.4"/><text x="468" y="7">Bamboo</text>
  </g>
</svg>
