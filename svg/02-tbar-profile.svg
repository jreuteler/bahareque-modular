<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" style="background:#fafafa">
  <text x="250" y="22" text-anchor="middle" font-size="13" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">T-bar Profile — Cross Section</text>

  <!-- Top/Bottom T-bar (85mm web) -->
  <text x="140" y="60" text-anchor="middle" font-size="10" fill="#555" font-weight="bold" font-family="Helvetica,Arial,sans-serif">Top/Bottom T-bar</text>
  <text x="140" y="73" text-anchor="middle" font-size="8" fill="#888" font-family="Helvetica,Arial,sans-serif">(85 mm web height)</text>

  <!-- Flange -->
  <rect x="95" y="90" width="90" height="9" fill="#c0392b" stroke="#911" stroke-width="1"/>
  <!-- Web -->
  <rect x="136" y="99" width="9" height="120" fill="#c0392b" stroke="#911" stroke-width="1"/>

  <!-- Dimensions -->
  <!-- Flange width -->
  <line x1="95" y1="82" x2="185" y2="82" stroke="#333" stroke-width="0.5"/>
  <line x1="95" y1="78" x2="95" y2="86" stroke="#333" stroke-width="0.5"/>
  <line x1="185" y1="78" x2="185" y2="86" stroke="#333" stroke-width="0.5"/>
  <text x="140" y="79" text-anchor="middle" font-size="8" fill="#333" font-family="Helvetica,Arial,sans-serif">30 mm</text>

  <!-- Flange thickness -->
  <line x1="195" y1="90" x2="210" y2="90" stroke="#333" stroke-width="0.5"/>
  <line x1="195" y1="99" x2="210" y2="99" stroke="#333" stroke-width="0.5"/>
  <text x="225" y="97" font-size="8" fill="#333" font-family="Helvetica,Arial,sans-serif">3 mm</text>

  <!-- Web height -->
  <line x1="80" y1="90" x2="80" y2="219" stroke="#333" stroke-width="0.5"/>
  <line x1="75" y1="90" x2="85" y2="90" stroke="#333" stroke-width="0.5"/>
  <line x1="75" y1="219" x2="85" y2="219" stroke="#333" stroke-width="0.5"/>
  <text x="68" y="158" text-anchor="end" font-size="8" fill="#333" font-family="Helvetica,Arial,sans-serif" transform="rotate(-90,68,158)">85 mm</text>

  <!-- Web thickness -->
  <line x1="136" y1="228" x2="145" y2="228" stroke="#333" stroke-width="0.5"/>
  <text x="140" y="240" text-anchor="middle" font-size="8" fill="#333" font-family="Helvetica,Arial,sans-serif">3 mm</text>

  <!-- Labels -->
  <text x="200" y="110" font-size="8" fill="#c0392b" font-family="Helvetica,Arial,sans-serif">← Flange (mortar face)</text>
  <text x="200" y="165" font-size="8" fill="#c0392b" font-family="Helvetica,Arial,sans-serif">← Web (clamping surface)</text>

  <!-- Bamboo strip against web -->
  <rect x="120" y="130" width="14" height="40" fill="#8B5A2B" opacity="0.4" stroke="#6a4020" stroke-width="0.5"/>
  <text x="110" y="155" text-anchor="end" font-size="7" fill="#8B5A2B" font-family="Helvetica,Arial,sans-serif">bamboo strip</text>

  <!-- Clamping strip -->
  <rect x="117" y="130" width="3" height="40" fill="#555" opacity="0.7" stroke="#333" stroke-width="0.5"/>
  <text x="110" y="140" text-anchor="end" font-size="7" fill="#555" font-family="Helvetica,Arial,sans-serif">clamp</text>

  <!-- === Side T-bar (30mm web) === -->
  <text x="380" y="60" text-anchor="middle" font-size="10" fill="#555" font-weight="bold" font-family="Helvetica,Arial,sans-serif">Side T-bar</text>
  <text x="380" y="73" text-anchor="middle" font-size="8" fill="#888" font-family="Helvetica,Arial,sans-serif">(30 mm web height)</text>

  <!-- Flange -->
  <rect x="335" y="90" width="90" height="9" fill="#c0392b" stroke="#911" stroke-width="1"/>
  <!-- Web -->
  <rect x="376" y="99" width="9" height="40" fill="#c0392b" stroke="#911" stroke-width="1"/>

  <!-- Dimensions -->
  <line x1="335" y1="82" x2="425" y2="82" stroke="#333" stroke-width="0.5"/>
  <line x1="335" y1="78" x2="335" y2="86" stroke="#333" stroke-width="0.5"/>
  <line x1="425" y1="78" x2="425" y2="86" stroke="#333" stroke-width="0.5"/>
  <text x="380" y="79" text-anchor="middle" font-size="8" fill="#333" font-family="Helvetica,Arial,sans-serif">30 mm</text>

  <line x1="320" y1="90" x2="320" y2="139" stroke="#333" stroke-width="0.5"/>
  <line x1="315" y1="90" x2="325" y2="90" stroke="#333" stroke-width="0.5"/>
  <line x1="315" y1="139" x2="325" y2="139" stroke="#333" stroke-width="0.5"/>
  <text x="310" y="118" text-anchor="end" font-size="8" fill="#333" font-family="Helvetica,Arial,sans-serif">30 mm</text>

  <!-- === Assembly context === -->
  <text x="250" y="290" text-anchor="middle" font-size="10" fill="#555" font-weight="bold" font-family="Helvetica,Arial,sans-serif">In Context — Panel Edge</text>

  <g transform="translate(150, 300)">
    <!-- Mortar exterior -->
    <rect x="0" y="0" width="200" height="15" fill="#d4c4a8" opacity="0.3" stroke="#bbb" stroke-width="0.5"/>
    <text x="100" y="11" text-anchor="middle" font-size="6" fill="#888" font-family="Helvetica,Arial,sans-serif">mortar (exterior)</text>

    <!-- Flange flush with mortar -->
    <rect x="80" y="15" width="40" height="5" fill="#c0392b" stroke="#911" stroke-width="0.5"/>
    <text x="145" y="19" font-size="6" fill="#c0392b" font-family="Helvetica,Arial,sans-serif">← flange flush with mortar face</text>

    <!-- Web extending inward -->
    <rect x="97" y="20" width="5" height="50" fill="#c0392b" stroke="#911" stroke-width="0.5"/>

    <!-- Bamboo strips both sides -->
    <rect x="85" y="25" width="10" height="40" fill="#8B5A2B" opacity="0.4"/>
    <rect x="105" y="25" width="10" height="40" fill="#8B5A2B" opacity="0.4"/>

    <!-- Mortar interior -->
    <rect x="0" y="70" width="200" height="15" fill="#d4c4a8" opacity="0.3" stroke="#bbb" stroke-width="0.5"/>
    <text x="100" y="81" text-anchor="middle" font-size="6" fill="#888" font-family="Helvetica,Arial,sans-serif">mortar (interior)</text>

    <!-- Arrow showing web direction -->
    <line x1="100" y1="73" x2="100" y2="92" stroke="#555" stroke-width="1"/>
    <polygon points="96,90 104,90 100,96" fill="#555"/>
    <text x="100" y="103" text-anchor="middle" font-size="7" fill="#555" font-family="Helvetica,Arial,sans-serif">interior</text>
  </g>
</svg>
