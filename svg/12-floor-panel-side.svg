  <!-- ============================================================ -->
  <!-- A. 4m SINGLE ARCH (x=50 to x=650, width=600) -->
  <!-- ============================================================ -->
  <text x="350" y="52" text-anchor="middle" font-size="9" fill="#333" font-weight="bold" font-family="Helvetica,Arial,sans-serif">A. 4m Span — Single Arch (150mm rise)</text>

  <!-- TERRACOTTA TILES -->
  <rect x="50" y="65" width="600" height="12" fill="#c67a3c" opacity="0.5" stroke="#a05a10" stroke-width="0.5"/>
  <!-- CORK -->
  <rect x="50" y="77" width="600" height="6" fill="#d4a050" opacity="0.4" stroke="#b08030" stroke-width="0.3"/>

  <!-- MORTAR UPPER ZONE -->
  <rect x="50" y="83" width="600" height="95" fill="#e8d8b0" opacity="0.45" stroke="#bbb" stroke-width="0.5"/>
  <g fill="#a89060" opacity="0.25">
