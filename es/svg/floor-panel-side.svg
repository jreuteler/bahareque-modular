  <text x="400" y="32" font-size="7" text-anchor="middle" fill="#999" font-family="Helvetica,Arial,sans-serif">panel de 180mm · arco + tirante de bambú · cero acero en la luz</text>

  <!-- TERRACOTTA TILES -->
